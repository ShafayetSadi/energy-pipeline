# Eclipse Mosquitto MQTT broker configuration for the edge gateway stack.
# Anonymous access is allowed in this prototype. For production, configure
# password_file / acl_file and enable TLS.
listener 1883
allow_anonymous true
persistence false
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# QoS handling
max_qos 2
max_inflight_messages 200
max_queued_messages 10000

services:
  postgres:
    image: postgres:16
    container_name: wattflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wattflow
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wattflow"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wattflow-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/wattflow
      DB_POOL_SIZE: 50
      DB_MAX_OVERFLOW: 100
      DB_POOL_TIMEOUT: 30
      DB_POOL_RECYCLE: 1800
      DB_ECHO: "false"
      REQUEST_METRICS_CSV_PATH: /app/runtime/request_metrics.csv
    ports:
      - "8001:8000"
    volumes:
      - ./runtime:/app/runtime

volumes:
  pgdata:
